<!DOCTYPE html>
<html lang="en">
<head>
  <!-- dynamic values -->
  <title data-title>Music</title>
  <meta name="description" content="Music" data-description>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <div class="layout">

    <header class="content-box" id="header">

    </header>

    <!-- Sidebar Right -->
    <section class="content-box", id="right-sidebar">
      <!-- injected sidebar content -->
    </section>

    <!-- Sidebar Left -->
    <aside class="content-box" id="left-sidebar">
      <span class="label-button">Music</span>
      <p>listen to my music</p>
      <br>
      
      <div class="embed-box">
        <iframe 
          style="border: 0; width: 100%; height: 442px;" 
          src="https://bandcamp.com/EmbeddedPlayer/track=972575769/size=large/bgcol=333333/linkcol=4ec5ec/tracklist=false/transparent=true/" 
          seamless>
          <a href="https://dunkelarts.bandcamp.com/track/rainy-day">rainy day by dunkelarts</a>
        </iframe>
      </div>
    </aside>

    <!-- Main Content-->
    <main class="content-box" id="main-content">
      <div class="content-box2">
        <h1>
          <img src="assets/images/music.gif" class="blinkie">
          my music
          <img src="assets/images/music.gif" class="blinkie">
        </h1>
      </div>

      <div class="content-box2">
        <iframe
          src="https://www.youtube.com/embed/G_ZRMyKgHdw"
          title="YouTube video player"
          style="
            width: 100%;
            aspect-ratio: 16 / 9;
            border: 0;
            display: block;
          "
          allowfullscreen>
        </iframe>
      </div>

      <div class="content-box2">
        <h1>artists I like</h1>
        <div class="gallery">
          <figure>
            <img src="https://i.scdn.co/image/ab67616d00001e02ced490e566f828ee9ca8d263">
            <figcaption>Test</figcaption>
          </figure>
          <figure>
            <img src="">
            <figcaption>Test</figcaption>
          </figure>
          <figure>
            <img src="">
            <figcaption>Test</figcaption>
          </figure>
        </div>
    </main>
  </div>

  <div id="footerbox">
      <!-- injected footer content -->
  </div>

  <script src="/assets/js/layout.js"></script>
</body>
</html>
